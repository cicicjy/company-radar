name: Shanghai expansion lead monitor

on:
  schedule:
    - cron: "0 1 */2 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      LEAD_MIN_SCORE: ${{ vars.LEAD_MIN_SCORE || '62' }}
      LEAD_PAGE_LIMIT: ${{ vars.LEAD_PAGE_LIMIT || '16' }}
      LEAD_CONCURRENCY: ${{ vars.LEAD_CONCURRENCY || '4' }}
      LEAD_TIMEOUT_MS: ${{ vars.LEAD_TIMEOUT_MS || '9000' }}
      LEAD_TOTAL_CANDIDATE_LIMIT: ${{ vars.LEAD_TOTAL_CANDIDATE_LIMIT || '32' }}
      FEISHU_BOT_WEBHOOK_URL: ${{ secrets.FEISHU_BOT_WEBHOOK_URL }}
      FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SERVER_CHAN_SEND_KEY: ${{ secrets.SERVER_CHAN_SEND_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run expansion lead monitor
        run: node scripts/monitor-expansion-leads.js

      - name: Persist seen lead cache
        run: |
          if [[ -n "$(git status --porcelain .job-cache/seen-expansion-leads.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .job-cache/seen-expansion-leads.json
            git commit -m "chore: update seen expansion lead cache"
            git push
          fi
